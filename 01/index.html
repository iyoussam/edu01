<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독도의 역사와 발자취</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #f8fafc;
        }
        h1, h2, h3, .title-font {
            font-family: 'Hahmlet', serif;
        }
        
        /* 스크롤 애니메이션 초기 상태 */
        .timeline-item {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
        }
        
        /* 화면에 나타날 때의 상태 */
        .timeline-item.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 데스크톱 중앙선 배치를 위한 CSS */
        @media (min-width: 768px) {
            .timeline-content-left {
                width: 45%;
                margin-right: 55%;
                text-align: right;
            }
            .timeline-content-right {
                width: 45%;
                margin-left: 55%;
                text-align: left;
            }
            .timeline-dot {
                left: 50%;
                transform: translateX(-50%);
            }
        }
        @media (max-width: 767px) {
            .timeline-content-left, .timeline-content-right {
                width: 85%;
                margin-left: 15%;
            }
            .timeline-dot {
                left: 20px;
            }
            .timeline-line {
                left: 20px;
            }
        }
        
        .hero-bg {
            background: linear-gradient(to bottom, rgba(30, 58, 138, 0.9), rgba(15, 23, 42, 0.9)), url('https://images.unsplash.com/photo-1544485501-831828cb0cc0?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
        }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">

    <!-- Header Section -->
    <header class="hero-bg text-white py-24 px-6 text-center shadow-lg relative">
        <!-- 홈 버튼 -->
        <a href="../index.html" class="absolute top-4 left-4 md:top-6 md:left-6 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 hover:bg-white/20 backdrop-blur-md transition-all text-sm font-medium text-white z-50 border border-white/20 shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            홈
        </a>

        <div class="max-w-4xl mx-auto relative z-10">
            <h1 class="text-4xl md:text-5xl font-bold mb-4 drop-shadow-md">독도의 역사와 발자취</h1>
            <p class="text-lg md:text-xl text-blue-100 font-light max-w-2xl mx-auto">
                수백만 년 전의 탄생부터 오늘날에 이르기까지,<br>
                기록으로 증명되는 대한민국의 영토 독도의 역사를 살펴봅니다.
            </p>
        </div>
    </header>

    <!-- Navigation / Filters -->
    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md shadow-sm border-b border-slate-200">
        <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex justify-center gap-2 md:gap-4 overflow-x-auto w-full md:w-auto">
                <button onclick="filterTimeline('all')" class="filter-btn active px-4 py-2 rounded-full text-sm font-medium transition-colors bg-blue-600 text-white hover:bg-blue-700 whitespace-nowrap" data-target="all">전체 보기</button>
                <button onclick="filterTimeline('era1')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap" data-target="era1">선사 및 전근대</button>
                <button onclick="filterTimeline('era2')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap" data-target="era2">근대</button>
                <button onclick="filterTimeline('era3')" class="filter-btn px-4 py-2 rounded-full text-sm font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap" data-target="era3">현대</button>
            </div>
            <!-- 검색창 추가 -->
            <div class="relative w-full md:w-64 shrink-0">
                <input type="text" id="searchInput" placeholder="연도 또는 내용 검색..." class="w-full pl-10 pr-4 py-2 rounded-full border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all bg-white/80 backdrop-blur-sm">
                <svg class="w-4 h-4 text-slate-400 absolute left-4 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
        </div>
    </nav>

    <!-- Timeline Section -->
    <main class="max-w-5xl mx-auto px-4 py-16 relative" id="timeline-container">
        <!-- 중앙 수직선 -->
        <div class="timeline-line absolute top-0 bottom-0 w-1 bg-blue-200 rounded md:left-1/2 md:-translate-x-1/2 z-0"></div>

        <!-- Timeline Items will be injected here by JS -->
        <div id="timeline-content" class="relative z-10 w-full pt-8 pb-16"></div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-8 text-center text-sm">
        <p>&copy; 대한민국 아름다운 섬, 독도. All rights reserved.</p>
    </footer>

    <script>
        // 타임라인 데이터
        const timelineData = [
            // 선사 및 전근대
            { year: "약 460~250만 년 전", text: "동해 해저의 화산 활동으로 독도 탄생 (울릉도보다 먼저 생성).", era: "era1" },
            { year: "1454년", text: "<span class='font-bold text-blue-700'>『세종실록지리지』</span>에 우산(독도)과 무릉(울릉도) 두 섬이 울진현 동쪽 바다에 있으며, 날씨가 맑으면 서로 보인다고 기록됨.", era: "era1" },
            { year: "1481년", text: "<span class='font-bold text-blue-700'>「팔도총도」</span>에 울릉도와 우산도(독도)가 그려짐.", era: "era1" },
            { year: "1531년", text: "<span class='font-bold text-blue-700'>『신증동국여지승람』</span>에 우산도와 울릉도에 관한 지리적 내용이 기술됨.", era: "era1" },
            { year: "1667년", text: "일본 사료 <span class='font-bold text-red-600'>『은주시청합기』</span>에 일본의 서쪽 경계가 오키섬이며, 독도와 울릉도는 조선의 땅임이 명시됨.", era: "era1" },
            { year: "1693년", text: "제1차 안용복 사건 발생. 안용복이 일본 어부들에게 납치되어 오키섬으로 끌려가 독도가 조선 땅임을 주장함.", era: "era1" },
            { year: "1695년", text: "일본 막부의 질문에 돗토리번이 \"죽도(울릉도)와 송도(독도)는 본번 소속이 아니다\"라고 답변함.", era: "era1" },
            { year: "1696년 1월", text: "일본 막부, 일본인의 울릉도 도해를 금지하는 '죽도 도해 금지령' 하달.", era: "era1" },
            { year: "1696년", text: "제2차 안용복 사건 발생. 안용복이 다시 도일하여 독도가 조선의 영토임을 강력히 주장함.", era: "era1" },
            { year: "1697년", text: "조선 정부, 울릉도와 주변 섬을 정기적으로 시찰하는 수토관 제도 신설 (1894년까지 지속).", era: "era1" },
            { year: "1785년", text: "일본 실학자 하야시 시헤이의 <span class='font-bold text-red-600'>「삼국접양지도」</span>에서 독도를 조선과 같은 황색으로 칠하고 '조선의 것'으로 표기함.", era: "era1" },
            { year: "1870년", text: "일본 외무성 관리들의 보고서인 <span class='font-bold text-red-600'>『조선국 교제시말 내탐서』</span>에서 울릉도와 독도가 조선 영토가 된 사정을 밝힘.", era: "era1" },
            { year: "1877년", text: "일본 최고 행정기관 태정관이 \"울릉도 외 1도(독도)는 일본과 관계가 없다\"는 <span class='font-bold text-red-600'>「태정관 지령」</span>을 내림.", era: "era1" },
            
            // 근대
            { year: "1900년 10월 25일", text: "대한제국 정부, <span class='font-bold text-blue-700'>「칙령 제41호」</span>를 제정하여 독도를 울릉군 관할 구역으로 명문화하고 국내외에 선포함.", era: "era2" },
            { year: "1905년 1월", text: "일본 내각, 독도를 자국 영토로 편입하기로 각의 결정.", era: "era2", isAlert: true },
            { year: "1905년 2월 22일", text: "일본 시마네현이 <span class='font-bold text-red-600'>「시마네현 고시 제40호」</span>를 통해 독도를 '다케시마'로 명명하고 편입을 발표함.", era: "era2", isAlert: true },
            { year: "1906년", text: "울릉군수 심흥택이 일본의 독도 영지 편입 사실을 보고하자, 대한제국 의정부가 <span class='font-bold text-blue-700'>「지령 제3호」</span>를 통해 독도 영유권 주장에 근거가 없음을 분명히 함.", era: "era2" },

            // 현대
            { year: "1946년 1월 29일", text: "연합군최고사령관 지령(SCAPIN) 제677호에 의해 독도가 일본의 통치 및 행정 범위에서 제외되어 한국으로 반환됨.", era: "era3" },
            { year: "1951년 1월 18일", text: "한국 정부, <span class='font-bold text-blue-700'>평화선(이승만 라인)</span>을 선포하여 독도를 포함한 인접 해양의 주권을 대내외에 명확히 함.", era: "era3" },
            { year: "1950년대 초", text: "한국 전쟁의 혼란기에 일본의 침투를 막기 위해 민간인들로 구성된 독도의용수비대 활동 (홍순칠 등).", era: "era3" },
            { year: "1953년 9월", text: "울릉경찰서 소속 독도경비대가 상주하며 본격적인 경비 업무 시작.", era: "era3" },
            { year: "1954년 9월", text: "일본 정부가 독도 문제를 국제사법재판소(ICJ)에 회부하자고 제안했으나 한국 정부는 이를 거부함.", era: "era3" },
            { year: "1965년 6월", text: "한일국교정상화 및 한일어업협정 체결. 독도 문제는 '앞으로 해결해야 할 문제'로 간주하여 언급을 피함.", era: "era3" },
            { year: "1981년", text: "최종덕 씨가 독도로 주민등록을 이전하여 독도 최초의 주민이 됨 (1968년부터 거주).", era: "era3" },
            { year: "1998년 9월", text: "배타적 경제수역(EEZ) 도입에 따라 신한일어업협정 체결. 독도가 중간수역에 포함되며 영유권 및 어장 확보를 둘러싼 갈등이 재점화됨.", era: "era3" },
            { year: "2005년 3월 16일", text: "일본 시마네현 의회가 '다케시마의 날' 조례를 제정하여 한일 간 갈등이 심화됨.", era: "era3", isAlert: true },
            { year: "2006년 4월 25일", text: "노무현 대통령, 독도 문제에 대한 대국민 특별담화 발표.", era: "era3" },
            { year: "2008년", text: "일본 문부과학성이 학습지도요령을 통해 독도가 일본 영토라는 교육을 강화하도록 주문함.", era: "era3", isAlert: true },
            { year: "2011년~현재", text: "일본 중학교 및 초등학교 교과서에서 독도 영유권 주장과 한국의 '불법 점거' 기술이 점차 확대·심화됨.", era: "era3", isAlert: true }
        ];

        const container = document.getElementById('timeline-content');
        let currentEra = 'all'; // 현재 선택된 시대 필터 상태 저장
        
        // 아이콘 SVG 헬퍼
        const getIcon = (isAlert) => {
            if(isAlert) {
                return `<svg class="w-5 h-5 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
            }
            return `<svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`;
        };

        // 타임라인 렌더링 함수
        function renderTimeline() {
            container.innerHTML = '';
            
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            let visibleIndex = 0;

            // 필터 및 검색 적용
            const filteredData = timelineData.filter(item => {
                const matchEra = currentEra === 'all' || item.era === currentEra;
                // 검색어에서 HTML 태그를 제거하여 순수 텍스트로 검색하게 함
                const plainText = item.text.replace(/<[^>]*>?/gm, ''); 
                const matchSearch = item.year.toLowerCase().includes(searchQuery) || plainText.toLowerCase().includes(searchQuery);
                
                return matchEra && matchSearch;
            });

            if (filteredData.length === 0) {
                container.innerHTML = `<div class="text-center text-slate-500 py-20 font-medium">검색 결과가 없습니다.</div>`;
                return;
            }

            filteredData.forEach((item) => {
                // 좌/우 번갈아가며 배치 (필터링된 결과 내에서)
                const alignmentClass = visibleIndex % 2 === 0 ? 'timeline-content-left' : 'timeline-content-right';
                const cardBorder = item.isAlert ? 'border-l-4 border-red-400' : 'border-t-4 border-blue-500';
                
                const html = `
                    <div class="timeline-item flex relative mb-12 w-full" data-era="${item.era}">
                        <!-- 타임라인 중앙 점 -->
                        <div class="timeline-dot absolute w-5 h-5 rounded-full ${item.isAlert ? 'bg-red-500' : 'bg-blue-600'} border-4 border-white shadow flex items-center justify-center z-20"></div>
                        
                        <!-- 콘텐츠 카드 -->
                        <div class="${alignmentClass}">
                            <div class="bg-white rounded-xl shadow-md p-6 hover:shadow-lg transition-shadow duration-300 ${cardBorder} relative overflow-hidden group">
                                <div class="flex items-center gap-2 mb-3 ${visibleIndex % 2 === 0 ? 'md:justify-end justify-start' : 'justify-start'}">
                                    ${getIcon(item.isAlert)}
                                    <h3 class="title-font text-xl font-bold ${item.isAlert ? 'text-red-700' : 'text-slate-800'}">${item.year}</h3>
                                </div>
                                <p class="text-slate-600 leading-relaxed text-[15px] md:text-base">${item.text}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
                visibleIndex++;
            });

            // 렌더링 후 Intersection Observer 재설정 (스크롤 애니메이션)
            setupIntersectionObserver();
        }

        // 스크롤 애니메이션 설정
        function setupIntersectionObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });

            document.querySelectorAll('.timeline-item').forEach(item => {
                observer.observe(item);
            });
        }

        // 필터 버튼 클릭 이벤트
        function filterTimeline(era) {
            currentEra = era; // 선택된 시대 저장

            // 버튼 스타일 업데이트
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.target === era) {
                    btn.classList.remove('bg-slate-100', 'text-slate-600');
                    btn.classList.add('bg-blue-600', 'text-white');
                } else {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-slate-100', 'text-slate-600');
                }
            });

            // 타임라인 다시 그리기
            renderTimeline();
        }

        // 검색창 입력 이벤트 리스너
        document.getElementById('searchInput').addEventListener('input', () => {
            renderTimeline();
        });

        // 초기 렌더링
        window.addEventListener('DOMContentLoaded', () => {
            renderTimeline();
        });
    </script>
</body>
</html>
